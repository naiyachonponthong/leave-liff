<style>
/* ============================================================
   THEME — Impeccable (OKLCH) + Bootstrap 5 override
   กลยุทธ์สี: Committed — navy/indigo (brand) + gold/amber (accent)
   ============================================================ */
:root{
  --brand:      oklch(0.46 0.12 264);
  --brand-700:  oklch(0.37 0.11 264);
  --brand-900:  oklch(0.27 0.06 264);
  --brand-100:  oklch(0.93 0.03 264);
  --brand-050:  oklch(0.97 0.015 264);

  --accent:     oklch(0.84 0.15 84);
  --accent-600: oklch(0.76 0.15 78);
  --accent-700: oklch(0.68 0.14 72);

  --bg:         oklch(0.972 0.012 265);
  --surface:    oklch(1 0 0);
  --surface-2:  oklch(0.985 0.008 265);
  --ink:        oklch(0.28 0.03 265);
  --ink-soft:   oklch(0.42 0.025 265);
  --muted:      oklch(0.56 0.02 265);
  --line:       oklch(0.91 0.012 265);

  --ok:     oklch(0.66 0.15 152);
  --warn:   oklch(0.80 0.15 80);
  --danger: oklch(0.60 0.20 25);
  --info:   oklch(0.66 0.12 240);

  --radius: 14px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px oklch(0.4 0.05 265 / .06), 0 1px 3px oklch(0.4 0.05 265 / .08);
  --shadow:    0 4px 14px oklch(0.4 0.05 265 / .08);
  --shadow-lg: 0 18px 50px oklch(0.35 0.08 265 / .22);

  --bs-body-font-family: 'Prompt', system-ui, sans-serif;
}

[data-theme="dark"]{
  --bg:        oklch(0.21 0.02 265);
  --surface:   oklch(0.26 0.025 265);
  --surface-2: oklch(0.30 0.025 265);
  --ink:       oklch(0.93 0.01 265);
  --ink-soft:  oklch(0.82 0.015 265);
  --muted:     oklch(0.66 0.02 265);
  --line:      oklch(0.37 0.02 265);
  --brand-100: oklch(0.34 0.05 264);
  --brand-050: oklch(0.30 0.03 264);
}

*{ font-family: 'Prompt', system-ui, sans-serif; }
html,body{ height:100%; }
body{
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  letter-spacing: .1px;
}

/* ---------- buttons ---------- */
.btn{ border-radius: var(--radius-sm); font-weight: 500; padding:.55rem 1.1rem; }
.btn-accent{
  background: var(--accent);
  border:1px solid var(--accent);
  color: var(--brand-900);
  font-weight: 600;
}
.btn-accent:hover{ background: var(--accent-600); border-color: var(--accent-600); color: var(--brand-900); }
.btn-accent:active{ background: var(--accent-700) !important; }
.btn-brand{ background: var(--brand); border:1px solid var(--brand); color:#fff; }
.btn-brand:hover{ background: var(--brand-700); border-color: var(--brand-700); color:#fff; }
.btn-ghost{ background: transparent; border:1px solid var(--line); color: var(--ink-soft); }
.btn-ghost:hover{ background: var(--surface-2); color: var(--ink); }

/* ============================================================
   LOGIN
   ============================================================ */
.auth-wrap{
  min-height:100vh;
  display:grid; place-items:center;
  padding: 24px;
  background:
    radial-gradient(1200px 520px at 12% -10%, var(--brand-100), transparent 60%),
    radial-gradient(900px 480px at 110% 120%, oklch(0.9 0.06 84 / .5), transparent 55%),
    var(--bg);
}
.auth-card{
  width:100%; max-width: 412px;
  background: var(--brand);
  color:#fff;
  border-radius: 22px;
  box-shadow: var(--shadow-lg);
  overflow:hidden;
}
.auth-head{
  padding: 34px 32px 8px;
  text-align:center;
}
.auth-logo{
  width:64px; height:64px; border-radius:18px;
  background: var(--accent);
  display:grid; place-items:center;
  margin: 0 auto 14px;
  box-shadow: 0 8px 22px oklch(0.7 0.16 84 / .45);
}
.auth-logo i{ font-size: 30px; color: var(--brand-900); }
.auth-logo img{ width:100%; height:100%; object-fit:cover; border-radius:18px; }
.auth-head h1{ font-size: 1.32rem; font-weight:600; margin:0; }
.auth-head p{ color: oklch(0.86 0.04 264); font-size:.86rem; margin:.25rem 0 0; }
.auth-body{ padding: 22px 32px 34px; }
.auth-body .form-label{ color: oklch(0.86 0.03 264); font-size:.84rem; margin-bottom:.3rem; }
.auth-body .input-group-text{
  background: oklch(0.4 0.1 264); border:0; color: oklch(0.82 0.04 264);
}
.auth-body .form-control{
  background: oklch(0.42 0.1 264);
  border:1px solid oklch(0.5 0.1 264);
  color:#fff; padding:.62rem .8rem;
}
.auth-body .form-control::placeholder{ color: oklch(0.7 0.05 264); }
.auth-body .form-control:focus{
  background: oklch(0.44 0.1 264);
  border-color: var(--accent);
  box-shadow: 0 0 0 .2rem oklch(0.84 0.15 84 / .25);
  color:#fff;
}
.auth-body .btn-toggle{
  background: oklch(0.42 0.1 264); border:1px solid oklch(0.5 0.1 264);
  color: oklch(0.82 0.04 264); border-left:0;
}
.auth-foot{ color: oklch(0.78 0.04 264); font-size:.78rem; }
.auth-foot a{ color: var(--accent); text-decoration:none; }

/* ============================================================
   APP SHELL
   ============================================================ */
.topbar{
  height:62px; background: var(--surface);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:12px;
  padding: 0 18px; position:sticky; top:0; z-index:30;
}
.topbar .brand{ display:flex; align-items:center; gap:10px; font-weight:600; color:var(--ink); }
.brand-mark{
  width:38px; height:38px; border-radius:11px;
  background: var(--brand); color:#fff; display:grid; place-items:center;
}
.brand-mark img{ width:100%; height:100%; object-fit:cover; border-radius:11px; }
.brand-mark i{ font-size:18px; }

.layout{ display:flex; min-height: calc(100vh - 62px); }
.sidebar{
  width: 248px; flex-shrink:0; background: var(--surface);
  border-right:1px solid var(--line); padding:16px 12px;
  position:sticky; top:62px; height: calc(100vh - 62px); overflow:auto;
}
.sidebar .group-label{
  font-size:.7rem; letter-spacing:.06em; text-transform:uppercase;
  color: var(--muted); padding: 14px 12px 6px; font-weight:600;
}
.sidebar .nav-link{
  display:flex; align-items:center; gap:11px;
  color: var(--ink-soft); padding:.62rem .8rem; border-radius:11px;
  font-weight:500; margin-bottom:2px; cursor:pointer;
}
.sidebar .nav-link i{ font-size:17px; width:20px; text-align:center; }
.sidebar .nav-link:hover{ background: var(--surface-2); color: var(--ink); }
.sidebar .nav-link.active{
  background: var(--brand); color:#fff;
  box-shadow: 0 6px 16px oklch(0.46 0.12 264 / .3);
}
.content{ flex:1; padding: 26px 30px; max-width:100%; }

.page-title{ font-size:1.4rem; font-weight:600; margin:0; }
.page-sub{ color: var(--muted); font-size:.9rem; margin:.15rem 0 0; }

/* user chip */
.user-chip{ display:flex; align-items:center; gap:10px; cursor:pointer; }
.user-avatar{
  width:38px; height:38px; border-radius:50%;
  background: var(--brand-100); color: var(--brand-700);
  display:grid; place-items:center; font-weight:600;
}
.user-chip .nm{ line-height:1.1; }
.user-chip .nm b{ font-size:.86rem; }
.user-chip .nm span{ font-size:.72rem; color:var(--muted); }

/* ============================================================
   KPI CARDS — ตั้งใจไม่ทำให้เหมือนกันทุกใบ
   ============================================================ */
.kpi-row{ display:grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap:16px; }
.kpi{
  background: var(--surface); border:1px solid var(--line);
  border-radius: var(--radius); padding:18px 18px;
  box-shadow: var(--shadow-sm);
}
.kpi .ico{
  width:42px; height:42px; border-radius:12px; display:grid; place-items:center;
  font-size:19px; margin-bottom:14px;
}
.kpi .val{ font-size:1.8rem; font-weight:700; line-height:1; }
.kpi .lbl{ color: var(--muted); font-size:.86rem; margin-top:6px; }
.kpi--feature{
  background: var(--brand); color:#fff; border-color: var(--brand);
}
.kpi--feature .lbl{ color: oklch(0.85 0.04 264); }
.kpi--feature .ico{ background: var(--accent); color: var(--brand-900); }
.ico-warn{ background: oklch(0.95 0.06 80); color: var(--accent-700); }
.ico-ok{ background: oklch(0.93 0.07 152); color: var(--ok); }
.ico-info{ background: var(--brand-100); color: var(--brand-700); }

/* card / panel */
.panel{
  background: var(--surface); border:1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.panel-h{ padding:16px 20px; border-bottom:1px solid var(--line); font-weight:600; }
.panel-b{ padding:20px; }

/* placeholder (เฟสที่ยังไม่ทำ) */
.soon{
  background: var(--surface); border:1px dashed var(--line);
  border-radius: var(--radius); padding:44px 24px; text-align:center; color:var(--muted);
}
.soon i{ font-size:34px; color: var(--brand-300, var(--brand-100)); display:block; margin-bottom:12px; }
.soon b{ color: var(--ink); display:block; font-size:1.02rem; }

/* responsive */
@media (max-width: 992px){
  .kpi-row{ grid-template-columns:1fr 1fr; }
}
@media (max-width: 768px){
  .sidebar{ position:fixed; left:-260px; z-index:40; transition:left .25s; box-shadow: var(--shadow-lg); }
  .sidebar.open{ left:0; }
  .content{ padding:18px 16px; }
  .kpi-row{ grid-template-columns:1fr; }
  .kpi--feature{ grid-column: 1 / -1; }
  .backdrop{ position:fixed; inset:0; background: oklch(0.2 0.03 265 / .4); z-index:39; }
}
.backdrop{ display:none; }

/* nav pills (master tabs) */
.nav-pills .nav-link{ color: var(--ink-soft); border-radius:11px; font-weight:500; }
.nav-pills .nav-link.active{ background: var(--brand); color:#fff; }

/* logo preview */
.logo-preview{
  width:96px; height:96px; border-radius:20px; margin:0 auto;
  background: var(--surface-2); border:1px solid var(--line);
  display:grid; place-items:center; overflow:hidden;
}
.logo-preview i{ font-size:34px; color: var(--muted); }
.logo-preview img{ width:100%; height:100%; object-fit:cover; }

/* switches + color chip */
.form-check-input:checked{ background-color: var(--brand); border-color: var(--brand); }
.lt-color{ width:14px; height:14px; border-radius:4px; display:inline-block; vertical-align:middle; margin-right:6px; }
.badge-soft{ background: var(--surface-2); color: var(--ink-soft); border:1px solid var(--line); font-weight:500; }
.table > :not(caption) > * > *{ padding:.7rem .9rem; }
.day-chip{ cursor:pointer; user-select:none; padding:.4rem .7rem; border-radius:9px; border:1px solid var(--line); background:var(--surface); font-size:.85rem; }
.day-chip.on{ background: var(--brand); color:#fff; border-color: var(--brand); }
.emp-avatar{ width:38px; height:38px; border-radius:50%; object-fit:cover; flex-shrink:0; }
.emp-avatar-ph{ display:grid; place-items:center; background:var(--brand-100); color:var(--brand-700); font-weight:600; }
.emp-avatar-ph{ width:38px; height:38px; }

/* ── Help / Manual ── */
.help-step{ display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--line); }
.help-step:last-child{ border-bottom:0; padding-bottom:0; }
.help-num{ min-width:26px; height:26px; border-radius:50%; background:var(--brand); color:#fff; font-size:.76rem; font-weight:700; display:grid; place-items:center; flex-shrink:0; margin-top:2px; }

/* ── Select2 theme override ── */
.select2-container--default .select2-selection--single{
  height:38px;border:1px solid var(--line);border-radius:8px;background:var(--surface);
}
.select2-container--default .select2-selection--single .select2-selection__rendered{
  line-height:36px;color:var(--text);padding-left:12px;font-family:'Prompt',sans-serif;font-size:.9rem;
}
.select2-container--default .select2-selection--single .select2-selection__arrow{
  height:36px;right:6px;
}
.select2-container--default.select2-container--focus .select2-selection--single,
.select2-container--default.select2-container--open .select2-selection--single{
  border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-100);outline:none;
}
.select2-dropdown{
  border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-md);background:var(--surface);
}
.select2-search--dropdown .select2-search__field{
  border:1px solid var(--line);border-radius:6px;padding:6px 10px;
  font-family:'Prompt',sans-serif;font-size:.85rem;background:var(--surface-2);color:var(--text);
}
.select2-results__option{ font-family:'Prompt',sans-serif;font-size:.88rem;padding:7px 12px; }
.select2-container--default .select2-results__option--highlighted[aria-selected]{
  background:var(--brand);color:#fff;
}
.select2-container--default .select2-results__option[aria-selected=true]{
  background:var(--brand-100);color:var(--brand);
}

/* ── Skeleton loading ── */
@keyframes shimmer{ from{ background-position:200% center; } to{ background-position:-200% center; } }
@keyframes spin-a{ to{ transform:rotate(360deg); } }
.skel{
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--line) 50%, var(--surface-2) 75%);
  background-size: 400% 100%;
  border-radius: 6px;
  animation: shimmer 1.4s ease-in-out infinite;
}
.skel-row td{ padding: .55rem .9rem !important; }
.skel-cell{ height: 13px; border-radius: 5px; }
.skel-cell.w-30{ width:30%; } .skel-cell.w-50{ width:50%; } .skel-cell.w-70{ width:70%; } .skel-cell.full{ width:100%; }

/* ── Button spinner (CSS-only) ── */
.btn-spin{ position:relative; color:transparent !important; pointer-events:none; }
.btn-spin::after{
  content:''; position:absolute;
  width:15px; height:15px; top:50%; left:50%; margin:-7.5px 0 0 -7.5px;
  border:2px solid currentColor; border-top-color:transparent;
  border-radius:50%; animation:spin-a .7s linear infinite;
}
</style>
